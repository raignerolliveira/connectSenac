<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Palavra-passe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex align-items-center bg-light vh-100">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="card shadow-lg border-0 rounded-4 p-4">
                    <h4 class="fw-bold text-center mb-3" style="color: #004a8d;">Recuperar Acesso</h4>
                    <p class="small text-muted text-center mb-4">Insira o seu e-mail. Enviaremos as instruções para criar uma nova palavra-passe.</p>
                    <form id="formEsqueci">
                        <div class="form-floating mb-3">
                            <input type="email" class="form-control" id="emailRecuperacao" placeholder="E-mail" required>
                            <label for="emailRecuperacao">O seu E-mail</label>
                        </div>
                        <div id="msgRecuperacao" class="small text-center mb-3 fw-bold"></div>
                        <button type="submit" class="btn btn-primary w-100 mb-2">Enviar Link</button>
                        <a href="index.html" class="btn btn-light w-100">Voltar ao Login</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
