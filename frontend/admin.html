<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Senac - Painel da Coordenação</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand">Connect Senac | <small>Visão da Coordenação</small></span>
            <a href="index.html" class="btn btn-outline-light btn-sm">Voltar ao Login</a>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-12">
                <div class="card shadow-sm border-top border-dark border-3">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5 class="card-title text-dark mb-0">Gestão Geral de Agendamentos</h5>
                            <button class="btn btn-sm btn-primary" onclick="carregarTodosAgendamentos()">Atualizar Lista</button>
                        </div>

                        <div class="table-responsive">
                            <table class="table table-striped table-hover align-middle">
                                <thead class="table-dark">
                                    <tr>
                                        <th>Data/Hora</th>
                                        <th>Cliente (Modelo)</th>
                                        <th>Telefone</th>
                                        <th>Serviço</th>
                                        <th>Estado</th>
                                    </tr>
                                </thead>
                                <tbody id="tabelaAdmin">
                                    </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
