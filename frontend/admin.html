<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Senac - Administração</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar-brand { font-weight: 700; letter-spacing: 0.5px; }
        .card { border: none; border-radius: 12px; }
        .card-header { background-color: #ffffff; border-bottom: 1px solid #f0f0f0; border-radius: 12px 12px 0 0 !important; }
        .btn-brand { background-color: #004a8d; color: white; font-weight: 600; border-radius: 8px; }
        .btn-brand:hover { background-color: #003366; color: white; }
        .section-title { color: #004a8d; font-weight: 700; font-size: 1.2rem; }</style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm" style="background-color: #004a8d;">
        <div class="container">
            <a class="navbar-brand" href="#">Connect Senac <span class="badge bg-light text-dark ms-2">Admin</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <button class="btn btn-outline-light btn-sm mt-1" id="btnSair">Sair do Sistema</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <!-- painel de metricas -->
        <div class="row mb-5 g-3" id="painelMetricas">
            <div class="col-12 mb-2">
                <h4 class="section-title">📊 Visão Geral da Unidade</h4>
            </div>

            <div class="col-sm-6 col-lg-3">
                <div class="card shadow-sm border-0 border-start border-primary border-4 h-100">
                    <div class="card-body">
                        <div class="text-muted small fw-bold text-uppercase">Total de Modelos</div>
                        <h2 class="mb-0 fw-bold text-dark" id="metricUsuarios">--</h2>
                    </div>
                </div>
            </div>

            <div class="col-sm-6 col-lg-3">
                <div class="card shadow-sm border-0 border-start border-success border-4 h-100">
                    <div class="card-body">
                        <div class="text-muted small fw-bold text-uppercase">Agendamentos Ativos</div>
                        <h2 class="mb-0 fw-bold text-dark" id="metricAgendados">--</h2>
                    </div>
                </div>
            </div>

            <div class="col-sm-6 col-lg-3">
                <div class="card shadow-sm border-0 border-start border-warning border-4 h-100">
                    <div class="card-body">
                        <div class="text-muted small fw-bold text-uppercase">Serviços Concluídos</div>
                        <h2 class="mb-0 fw-bold text-dark" id="metricConcluidos">--</h2>
                    </div>
                </div>
            </div>

            <div class="col-sm-6 col-lg-3">
                <div class="card shadow-sm border-0 border-start border-danger border-4 h-100">
                    <div class="card-body">
                        <div class="text-muted small fw-bold text-uppercase">Taxa de Cancelamento</div>
                        <h2 class="mb-0 fw-bold text-dark" id="metricCancelamento">--</h2>
                    </div>
                </div>
            </div>
        </div>

        <!-- cadastros de cursos -->
        <div class="row g-4">

            <div class="col-lg-6">
                <div class="card shadow-sm h-100">
                    <div class="card-header py-3">
                        <h5 class="mb-0 section-title">📚 1. Cadastrar Novo Curso</h5>
                    </div>
                    <div class="card-body p-4">
                        <form id="formCurso">
                            <div class="form-floating mb-3">
                                <input type="text" class="form-control" id="nomeCurso" placeholder="Nome do Curso" required>
                                <label for="nomeCurso">Nome do Curso (Ex: Corte Feminino)</label>
                            </div>

                            <div class="form-floating mb-3">
                                <textarea class="form-control" id="descricaoCurso" placeholder="Descrição" style="height: 100px" required></textarea>
                                <label for="descricaoCurso">Descrição / Conteúdo Prático</label>
                            </div>

                            <div class="form-floating mb-3">
                                <textarea class="form-control" id="motivoCurso" placeholder="Motivo" style="height: 80px"></textarea>
                                <label for="motivoCurso">O que o modelo ganha? (Benefícios)</label>
                            </div>

                            <div class="form-floating mb-4">
                                <textarea class="form-control" id="restricoesCurso" placeholder="Restrições" style="height: 80px"></textarea>
                                <label for="restricoesCurso">Restrições (Ex: Sem química no cabelo)</label>
                            </div>

                            <div id="msgCurso" class="mb-3 text-center small fw-bold"></div>

                            <button type="submit" class="btn btn-brand w-100 py-2">Salvar Curso no Catálogo</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-lg-6">
                <div class="card shadow-sm h-100">
                    <div class="card-header py-3">
                        <h5 class="mb-0 section-title">📅 2. Abrir Vagas (Grade de Horários)</h5>
                    </div>
                    <div class="card-body p-4">
                        <form id="formVagas">

                            <div class="form-floating mb-3">
                                <select class="form-select" id="selectCurso" required>
                                    <option value="" disabled selected>Carregando cursos...</option>
                                </select>
                                <label for="selectCurso">Vincular a qual curso?</label>
                            </div>

                            <div class="row g-3 mb-4">
                                <div class="col-md-7">
                                    <div class="form-floating">
                                        <input type="datetime-local" class="form-control" id="dataHora" required>
                                        <label for="dataHora">Data e Horário de Início</label>
                                    </div>
                                </div>
                                <div class="col-md-5">
                                    <div class="form-floating">
                                        <input type="number" class="form-control" id="vagasTotais" placeholder="Vagas" min="1" required>
                                        <label for="vagasTotais">Nº de Vagas</label>
                                    </div>
                                </div>
                            </div>

                            <div id="msgVaga" class="mb-3 text-center small fw-bold"></div>

                            <button type="submit" class="btn btn-success w-100 py-2" style="font-weight: 600; border-radius: 8px;">Disponibilizar Vagas</button>
                        </form>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
