<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Senac - Registo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light py-5">

    <div class="container d-flex justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h3 class="text-center mb-4">Criar Conta</h3>

                    <form id="formCadastro">
                        <div class="mb-3">
                            <label for="nome" class="form-label">Nome Completo</label>
                            <input type="text" class="form-control" id="nome" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="email" class="form-label">E-mail</label>
                                <input type="email" class="form-control" id="email" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="telefone" class="form-label">Telefone</label>
                                <input type="text" class="form-control" id="telefone" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="senha" class="form-label">Palavra-passe</label>
                            <input type="password" class="form-control" id="senha" required>
                        </div>

                        <div class="alert alert-secondary mt-4">
                            <h5>Privacidade e Termos (LGPD)</h5>
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="checkbox" id="termoUso" required>
                                <label class="form-check-label" for="termoUso">
                                    Li e aceito os Termos de Uso e a Política de Privacidade.*
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="termoImagem">
                                <label class="form-check-label" for="termoImagem">
                                    Autorizo o uso de imagens dos procedimentos realizados para o portfólio acadêmico da turma (Opcional).
                                </label>
                            </div>
                        </div>

                        <div id="mensagemCadastro" class="mb-3"></div>

                        <button type="submit" class="btn btn-success w-100 mt-2">Finalizar Registo</button>
                    </form>

                    <div class="text-center mt-3">
                        <a href="index.html" class="text-decoration-none">Voltar ao Login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
