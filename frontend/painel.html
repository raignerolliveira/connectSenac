<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Senac - Meu Painel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
        <div class="container">
            <span class="navbar-brand">Connect Senac</span>
            <button class="btn btn-danger btn-sm" onclick="terminarSessao()">Sair</button>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-5 mb-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title text-primary mb-3">Agendar Serviço</h5>
                        <form id="formAgendamento">
                            <div class="mb-3">
                                <label for="servico" class="form-label">Serviço Desejado</label>
                                <select class="form-select" id="servico" required>
                                    <option value="" disabled selected>Selecione um serviço...</option>
                                    <option value="1">Corte de Cabelo (Modelo)</option>
                                    <option value="2">Maquiagem Artística</option>
                                    <option value="3">Manicure e Pedicure</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="dataHora" class="form-label">Data e Hora</label>
                                <input type="datetime-local" class="form-control" id="dataHora" required>
                            </div>

                            <div id="msgAgendamento" class="mb-2"></div>

                            <button type="submit" class="btn btn-success w-100">Confirmar Agendamento</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-7">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title text-primary mb-3">Meus Agendamentos</h5>
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>Data/Hora</th>
                                        <th>Serviço</th>
                                        <th>Estado</th>
                                        <th>Ação</th>
                                    </tr>
                                </thead>
                                <tbody id="tabelaAgendamentos">
                                    </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/painel.js"></script>
</body>
</html>
