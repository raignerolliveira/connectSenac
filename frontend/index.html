<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Senac - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .card-login { border: none; border-radius: 1rem; }
        .btn-brand { background-color: #004a8d; color: white; border-radius: 0.5rem; padding: 0.75rem; font-weight: 600; }
        .btn-brand:hover { background-color: #003366; color: white; }</style>
</head>
<body class="d-flex align-items-center py-4 bg-light vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-5 col-xl-4">
                <div class="card shadow-lg card-login">
                    <div class="card-body p-5 text-center">
                        <h2 class="fw-bold mb-2 text-uppercase" style="color: #004a8d;">Connect Senac</h2>
                        <p class="text-muted mb-4">Insira as suas credenciais para aceder</p>

                        <form id="formLogin">
                            <div class="form-floating mb-3 text-start">
                                <input type="email" class="form-control rounded-3" id="email" placeholder="name@example.com" required>
                                <label for="email">E-mail institucional ou pessoal</label>
                            </div>

                            <div class="form-floating mb-3 text-start">
                                <input type="password" class="form-control rounded-3" id="senha" placeholder="Palavra-passe" required>
                                <label for="senha">Palavra-passe</label>
                            </div>

                            <div class="d-flex justify-content-end mb-4">
                                <a href="./esqueci-senha.html" class="text-decoration-none small" style="color: #004a8d;">Esqueceu a palavra-passe?</a>
                            </div>

                            <div id="mensagemErro" class="alert alert-danger d-none small text-start py-2"></div>

                            <button type="submit" class="btn btn-brand w-100 mb-4">Entrar na Plataforma</button>
                        </form>

                        <div>
                            <p class="mb-0 small">Ainda não tem conta? <a href="cadastro.html" class="text-decoration-none fw-bold" style="color: #004a8d;">Registe-se aqui</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
